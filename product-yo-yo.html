<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Yo Yo — Scooby Cart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-50">
  <div class="max-w-5xl mx-auto px-6 py-12">
    <a href="index.html" class="inline-flex items-center gap-2 text-sm text-gray-600 hover:text-[#ff6b00]"><i class="fa-solid fa-arrow-left"></i> Back to Shop</a>

    <div class="mt-8 grid md:grid-cols-2 gap-8 bg-white p-8 rounded-3xl shadow-lg">
      <div>
        <div class="border rounded-2xl overflow-hidden mb-4">
          <img id="mainImage" src="img1/img1.jpg" alt="Yo Yo" class="w-full h-96 object-contain bg-gray-100">
        </div>

        <div class="flex gap-3">
          <img onclick="setImage('img1/img1.jpg')" src="img1/img1.jpg" class="w-20 h-20 object-cover rounded-xl cursor-pointer border" alt="img1">
          <img onclick="setImage('img1/img2.jpg')" src="img1/img2.jpg" class="w-20 h-20 object-cover rounded-xl cursor-pointer border" alt="img2">
          <img onclick="setImage('img1/img3.jpg')" src="img1/img3.jpg" class="w-20 h-20 object-cover rounded-xl cursor-pointer border" alt="img3">
        </div>
      </div>

      <div>
        <h1 class="text-3xl font-bold mb-2">Yo Yo</h1>
        <p class="text-sm text-gray-500 mb-6">Category: Toys</p>
        <p class="text-2xl font-semibold text-[#ff6b00] mb-6">৳199</p>

        <div class="mb-6">
          <h3 class="font-semibold mb-2">Product description</h3>
          <p class="text-gray-700">This is a you you product</p>
        </div>

        <div class="flex gap-4">
          <a href="index.html" class="px-6 py-3 rounded-3xl bg-[#ff6b00] text-white font-semibold">Buy Now</a>
          <a href="index.html" class="px-6 py-3 rounded-3xl border border-gray-200 text-gray-700">Continue Shopping</a>
        </div>

      </div>
    </div>
  </div>

  <script>
    function setImage(src) {
      const img = document.getElementById('mainImage')
      img.src = src
    }
  </script>
</body>
</html>
